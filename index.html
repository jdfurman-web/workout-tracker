<title>Ruck + Iron ГўВЂВ” Workout Tracker</title>
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d28;
  --card2: #222536;
  --border: #2a2d3a;
  --accent: #4a9eff;
  --green: #34d399;
  --yellow: #f59e0b;
  --red: #ef4444;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --dim: #64748b;
  --heading: #f8fafc;
  --radius: 14px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  min-height: 100dvh;
  padding-top: var(--safe-top);
  padding-bottom: calc(70px + var(--safe-bottom));
  overflow-x: hidden;
}

/* ГўВ”ВЂГўВ”ВЂ Header ГўВ”ВЂГўВ”ВЂ */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15,17,23,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 12px 16px 8px;
  border-bottom: 1px solid var(--border);
}
.header-title { font-size: 1.25rem; font-weight: 700; color: var(--heading); }
.header-sub { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
.veek-phase { display: inline-block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 10px; background: rgba(74,158,255,0.15); color: var(--accent); margin-left: 8px; }

/* ГўВ”ВЂГўВ”ВЂ Navigation ГўВ”ВЂГўВ”ВЂ */
.nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(26,29,40,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-bottom);
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 10px 0 8px;
  background: none;
  border: none;
  color: var(--dim);
  font-size: 0.65rem;
  font-weight: 600;
  cursor: pointer;
  transition: color 0.2s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 22px; height: 22px; }

/* ГўВ”ВЂГўВ”ВЂ Pages ГўВ”ВЂГўВ”ВЂ */
.page { display: none; padding: 16px; }
.page.active { display: block; }

/* ГўВ”ВЂГўВ”ВЂ Cards ГўВ”ВЂГўВ”ВЂ */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

/* ГўВ”ВЂГўВ”ВЂ Today View ГўВ”ВЂГўВ”ВЂ */
.day-type {
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.day-type.strength { color: var(--accent); }
.day-type.ruck { color: var(--green); }
.day-type.rest { color: var(--yellow); }
.day-name { font-size: 1.4rem; font-weight: 700; color: var(--heading); margin-bottom: 4px; }
.day-desc { font-size: 0.85rem; color: var(--muted); margin-bottom: 16px; }

/* ГўВ”ВЂГўВ”ВЂ Exercise Row ГўВ”ВЂГўВ”ВЂ */
.exercise {
  background: var(--card2);
  border-radius: 12px;
  margin-bottom: 10px;
  overflow: hidden;
}
.exercise-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  cursor: pointer;
}
.exercise-header:active { background: rgba(255,255,255,0.03); }
.ex-name { font-weight: 600; font-size: 0.95rem; color: var(--heading); flex: 1; }
.ex-prescription { font-size: 0.8rem; color: var(--muted); margin-left: 8px; white-space: nowrap; }
.ex-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); margin-left: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.ex-check.done { border-color: var(--green); background: var(--green); }
.ex-check.done::after { content: 'ГўВњВ“'; font-size: 12px; color: var(--bg); font-weight: 700; }
.ex-check.partial { border-color: var(--yellow); background: rgba(245,158,11,0.2); }
.exercise-detail { display: none; padding: 0 14px 14px; }
.exercise-detail.open { display: block; }
.ex-note { font-size: 0.8rem; color: var(--muted); font-style: italic; margin-bottom: 10px; }
.ex-rest { font-size: 0.75rem; color: var(--yellow); margin-bottom: 10px; }

/* ГўВ”ВЂГўВ”ВЂ Set Logging ГўВ”ВЂГўВ”ВЂ */
.set-row {
  display: grid;
  grid-template-columns: 32px 1fr 1fr 60px;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}
.set-label { font-size: 0.75rem; font-weight: 700; color: var(--dim); text-align: center; }
.set-input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 8px;
  color: var(--text);
  font-size: 0.95rem;
  text-align: center;
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
}
.set-input:focus { border-color: var(--accent); outline: none; }
.set-input::placeholder { color: var(--dim); }
.set-header {
  display: grid;
  grid-template-columns: 32px 1fr 1fr 60px;
  gap: 8px;
  margin-bottom: 6px;
}
.set-header span { font-size: 0.65rem; font-weight: 600; color: var(--dim); text-transform: uppercase; text-align: center; }

/* ГўВ”ВЂГўВ”ВЂ Ruck Logging ГўВ”ВЂГўВ”ВЂ */
.ruck-fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}
.ruck-field label {
  display: block;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 4px;
}

/* ГўВ”ВЂГўВ”ВЂ RPE Selector ГўВ”ВЂГўВ”ВЂ */
.rpe-row {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.rpe-btn {
  flex: 1;
  padding: 8px 0;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--muted);
  font-size: 0.85rem;
  font-weight: 600;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
}
.rpe-btn.selected { border-color: var(--accent); background: rgba(74,158,255,0.15); color: var(--accent); }
.rpe-label { font-size: 0.7rem; font-weight: 600; color: var(--dim); text-transform: uppercase; margin-top: 10px; margin-bottom: 4px; }

/* ГўВ”ВЂГўВ”ВЂ Notes ГўВ”ВЂГўВ”ВЂ */
.notes-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  color: var(--text);
  font-size: 0.85rem;
  resize: vertical;
  min-height: 44px;
  font-family: inherit;
}
.notes-input:focus { border-color: var(--accent); outline: none; }

/* ГўВ”ВЂГўВ”ВЂ Buttons ГўВ”ВЂГўВ”ВЂ */
.btn {
  display: block;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:active { background: #3a8bee; transform: scale(0.98); }
.btn-secondary { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.btn + .btn { margin-top: 8px; }

/* ГўВ”ВЂГўВ”ВЂ Week View ГўВ”ВЂГўВ”ВЂ */
.week-day {
  display: flex;
  align-items: center;
  padding: 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
  cursor: pointer;
}
.week-day:active { background: var(--card2); }
.week-day.today { border-color: var(--accent); }
.wd-date { width: 44px; text-align: center; margin-right: 12px; }
.wd-dow { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; font-weight: 600; }
.wd-num { font-size: 1.1rem; font-weight: 700; color: var(--heading); }
.wd-info { flex: 1; }
.wd-type { font-size: 0.9rem; font-weight: 600; color: var(--heading); }
.wd-detail { font-size: 0.75rem; color: var(--muted); }
.wd-status { width: 10px; height: 10px; border-radius: 50%; margin-left: 8px; }
.wd-status.complete { background: var(--green); }
.wd-status.partial { background: var(--yellow); }
.wd-status.upcoming { background: var(--border); }

/* ГўВ”ВЂГўВ”ВЂ History ГўВ”ВЂГўВ”ВЂ */
.history-entry {
  padding: 12px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
}
.he-date { font-size: 0.75rem; color: var(--dim); }
.he-title { font-size: 0.95rem; font-weight: 600; color: var(--heading); }
.he-stats { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

/* ГўВ”ВЂГўВ”ВЂ Settings ГўВ”ВЂГўВ”ВЂ */
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.setting-label { font-size: 0.9rem; color: var(--text); }
.setting-value { font-size: 0.9rem; color: var(--muted); }

/* ГўВ”ВЂГўВ”ВЂ Stats Grid ГўВ”ВЂГўВ”ВЂ */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.stat-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
}
.stat-num { font-size: 1.6rem; font-weight: 700; color: var(--heading); }
.stat-label { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; font-weight: 600; margin-top: 2px; }

/* ГўВ”ВЂГўВ”ВЂ Timer ГўВ”ВЂГўВ”ВЂ */
.timer-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: rgba(26,29,40,0.97);
  backdrop-filter: blur(20px);
  padding: calc(var(--safe-top) + 8px) 16px 10px;
  display: none;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid var(--accent);
}
.timer-bar.active { display: flex; }
.timer-time { font-size: 1.6rem; font-weight: 700; color: var(--heading); font-variant-numeric: tabular-nums; }
.timer-label { font-size: 0.75rem; color: var(--muted); }
.timer-dismiss {
  padding: 6px 16px;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
}

/* ГўВ”ВЂГўВ”ВЂ Misc ГўВ”ВЂГўВ”ВЂ */
.section-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin: 20px 0 10px; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-state p { margin-top: 8px; font-size: 0.85rem; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; }
.badge-blue { background: rgba(74,158,255,0.15); color: var(--accent); }
.badge-green { background: rgba(52,211,153,0.15); color: var(--green); }
.badge-yellow { background: rgba(245,158,11,0.15); color: var(--yellow); }

/* ГўВ”ВЂГўВ”ВЂ Date picker ГўВ”ВЂГўВ”ВЂ */
.date-input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  color: var(--text);
  font-size: 0.9rem;
  width: 100%;
  -webkit-appearance: none;
}
.date-input:focus { border-color: var(--accent); outline: none; }

/* ГўВ”ВЂГўВ”ВЂ Transitions ГўВ”ВЂГўВ”ВЂ */
.exercise-detail { transition: none; }

// Fill in null weeks (same as previous non-null)
function resolveWorkout(type, week) {
  let key = `${type}_${week}`;
  if (PROGRAM.workouts[key]) return PROGRAMNworkouts[key];
  // Walk backward to find the last defined workout
  for (let w = week - 1; w >= 1; w--) {
    let k = `${type}_${w}`;
    if (PROGRAM.workouts[k]) return PROGRAM.workouts[k];
  }
  return null;
}

function getState() {
  try {
    return JSON.parse(localStorage.getItem('ruckIronState') || '{}');
  } catch { return {}; }
}
function saveState(s) { localStorage.setItem('ruckIronState', JSON.stringify(s)); }

function getStartDate() {
  const s = getState();
  return s.startDate || null;
}
function setStartDate(d) {
  const s = getState();
  s.startDate = d;
  saveState(s);
}

function getWeekNumber(date) {
  const start = new Date(getStartDate());
  start.setHours(0,0,0,0);
  const d = new Date(date);
  d.setHours(0,0,0,0);
  const diff = Math.floor((d - start) / (1000*60*60*24));
  if (diff < 0) return 0;
  return Math.floor(diff / 7) + 1;
}

function getPhase(week) {
  if (week <= 4) return PROGRAM.phases[0];
  if (week <= 8) return PROGRAM.phases[1];
  return PROGRAM.phases[2];
}

function getDayWorkout(date) {
  const dow = date.getDay();
  const week = getWeekNumber(date);
  if (week < 1 || week > 12) return null;
  const type = PROGRAM.trainingDays[dow];
  if (!type) return { type: 'rest', message: PROGRAM.restDays[dow] || 'Rest day' };
  const workout = resolveWorkout(type, week);
  if (!workout) return { type: 'rest', message: 'Rest day' };
  return { ...workout, week, slotType: type };
}

// Log data
function getLog(dateStr) {
  const s = getState();
  return (s.logs || {})[dateStr] || null;
}
function saveLog(dateStr, data) {
  const s = getState();
  if (!s.logs) s.logs = {};
  s.logs[dateStr] = data;
  saveState(s);
}

function dateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
