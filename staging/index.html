<title>111 Hideaway Cove — Staging Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #F5F0E8; color: #2C2418; }
  .gate {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  .gate h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 28px; font-weight: 700; margin-bottom: 8px;
  }
  .gate p { font-size: 14px; color: #8C8070; margin-bottom: 24px; }
  .gate input {
    width: 260px; padding: 10px 16px; font-size: 16px;
    border: 1px solid #E0D8CC; border-radius: 6px;
    background: #FFFCF7; color: #2C2418; text-align: center;
    outline: none;
  }
  .gate input:focus { border-color: #C85A3A; }
  .gate button {
    margin-top: 12px; padding: 10px 32px; font-size: 14px; font-weight: 600;
    background: #C85A3A; color: #fff; border: none; border-radius: 6px;
    cursor: pointer;
  }
  .gate button:hover { background: #b04e32; }
  .gate .error { color: #C85A3A; font-size: 13px; margin-top: 12px; display: none; }
  #app-container { display: none; }
</style>
</head>
<body>

<div class="gate" id="gate">
  <h1>111 Hideaway Cove</h1>
  <p>Staging Tracker</p>
  <input type="password" id="pw" placeholder="Password" autocomplete="off">
  <button onclick="unlock()">Enter</button>
  <div class="error" id="err">Incorrect password</div>
</div>

<div id="app-container"></div>

<script>
var HASH = "184369c284dfc25d6901ebf21c1952b8f4a692c1830dc68ef3169b91fb0eafbf";

async function sha256(str) {
  var buf = new TextEncoder().encode(str);
  var hash = await crypto.subtle.digest("SHA-256", buf);
  return Array.from(new Uint8Array(hash)).map(function(b) { return b.toString(16).padStart(2, "0"); }).join("");
}

async function unlock() {
  var pw = document.getElementById("pw").value;
  var h = await sha256(pw);
  if (h === HASH) {
    localStorage.setItem("hideaway-auth", "1");
    showApp();
  } else {
    document.getElementById("err").style.display = "block";
    document.getElementById("pw").value = "";
    document.getElementById("pw").focus();
  }
}

function showApp() {
  document.getElementById("gate").style.display = "none";
  var container = document.getElementById("app-container");
  container.style.display = "block";
  // Write the app iframe
  var iframe = document.createElement("iframe");
  iframe.style.cssText = "width:100%;height:100vh;border:none;position:fixed;top:0;left:0;";
  iframe.srcdoc = APP_HTML;
  container.appendChild(iframe);
}

document.getElementById("pw").addEventListener("keydown", function(e) {
  if (e.key === "Enter") unlock();
});

// Check if already authed
if (localStorage.getItem("hideaway-auth") === "1") {
  showApp();
} else {
  document.getElementById("pw").focus();
}
